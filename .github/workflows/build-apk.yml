name: Build Flutter APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Install Dependencies
      working-directory: ./staffcheck_flutter_app
      run: |
        flutter create .
        flutter pub get
        flutter pub run flutter_launcher_icons

    - name: Build APK
      working-directory: ./staffcheck_flutter_app
      run: flutter build apk --release

    - name: Upload APK Release
      uses: actions/upload-artifact@v4
      with:
        name: staffcheck_app_apk
        path: staffcheck_flutter_app/build/app/outputs/flutter-apk/app-release.apk
