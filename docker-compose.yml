version: '3.9'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: staffcheck
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py create_admin &&
             gunicorn staffcheck.wsgi:application --bind 0.0.0.0:8000 --reload"
    environment:
      SECRET_KEY: django-insecure-local-dev-key
      DEBUG: "True"
      DB_HOST: db
      DB_NAME: staffcheck
      DB_USER: postgres
      DB_PASS: postgres
      DB_PORT: "5432"
      CORS_ORIGINS: http://localhost:5173
      TELEGRAM_BOT_TOKEN: "8224034084:AAGWIDEIARGrL5lyPc8TMpjOroKvwSxifLk"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
