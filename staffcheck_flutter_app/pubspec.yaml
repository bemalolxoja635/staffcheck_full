name: staffcheck_app
description: "StaffCheck tizimi uchun Flutter mobil ilovasi (iOS va Android qollab-quvvatlaydi)"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  provider: ^6.1.2
  google_fonts: ^6.2.1
  flutter_secure_storage: ^9.0.0
  mobile_scanner: ^5.0.0
  geolocator: ^11.0.0
  google_mlkit_face_detection: ^0.10.0
  fl_chart: ^0.68.0
  intl: ^0.19.0 # Sana va vaqt formatlash uchun
  shared_preferences: ^2.2.3
  local_auth: ^2.2.0
  url_launcher: ^6.2.0
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
