name: staffcheck_app
description: "StaffCheck tizimi uchun Flutter mobil ilovasi (iOS va Android qollab-quvvatlaydi)"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Tarmoq
  http: ^1.2.2

  # State management
  provider: ^6.1.2

  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0

  # Xavfsiz saqlash (JWT token)
  flutter_secure_storage: ^9.2.2

  # QR skaner (mobile_scanner - vision camera bilan emas)
  mobile_scanner: ^5.2.3

  # Joylashuv
  geolocator: ^13.0.1

  # Yuz aniqlash (MLKit)
  google_mlkit_face_detection: ^0.11.0

  # Sana/vaqt formatlash
  intl: ^0.19.0

  # Kichik sozlamalar saqlash
  shared_preferences: ^2.3.2

  # Biometrik
  local_auth: ^2.3.0

  # URL ochish (Telegram bot)
  url_launcher: ^6.3.0

  # QR kod ko'rsatish
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 26
